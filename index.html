<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="ツーボックス公式ミニゲーム「爆速受付チャレンジ」。ツボックとツボリンを正しい受付レーンへ誘導しよう！">
<title>爆速受付チャレンジ｜tsubox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@700;800&family=Montserrat:wght@700;800&display=swap');

:root{
  --tsubox-blue:#0091E0;
  --tsubox-blue-600:#007BC0;
  --tsubox-blue-700:#0062A0;
  --tsubox-blue-300:#7FC7F0;
  --tsubox-blue-200:#BFE3F7;
  --tsubox-blue-100:#E0F0FA;
  --tsubox-blue-050:#F1F8FD;
  --tsubox-red:#E50020;
  --ink-100:#E8EAEE;
  --ink-200:#D3D7DD;
  --ink-400:#858B96;
  --ink-600:#3C4148;
  --ink-800:#15171A;
  --font-jp:'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif;
  --font-round:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;
  --font-display:'Montserrat','Noto Sans JP',sans-serif;
  --shadow-sm:0 2px 6px rgba(12,20,30,.06),0 1px 2px rgba(12,20,30,.04);
  --shadow-md:0 6px 18px rgba(12,20,30,.08),0 2px 4px rgba(12,20,30,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--tsubox-blue-050);
  font-family:var(--font-jp);
  color:var(--ink-800);
  display:flex;justify-content:center;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  touch-action:manipulation;
}
#app{
  width:100%;max-width:430px;height:100dvh;
  background:#fff;position:relative;overflow:hidden;
  box-shadow:0 0 40px rgba(0,98,160,.10);
  display:flex;flex-direction:column;
}
.screen{display:none;flex-direction:column;height:100%;position:relative}
.screen.active{display:flex}

/* ============ 共通パーツ ============ */
.eyebrow{
  font-family:var(--font-display);font-weight:700;font-size:11px;
  letter-spacing:.18em;text-transform:uppercase;color:var(--tsubox-blue);
}
.tsubox-rule{
  height:2px;width:200px;margin:10px auto 0;
  background:linear-gradient(to right,var(--tsubox-blue) 0,var(--tsubox-blue) 40px,var(--ink-200) 40px,var(--ink-200) 100%);
}
.btn{
  font-family:var(--font-round);font-weight:800;font-size:18px;
  border:none;cursor:pointer;border-radius:999px;
  padding:16px 48px;color:#fff;background:var(--tsubox-blue);
  box-shadow:var(--shadow-md);transition:background .18s, transform .12s;
  letter-spacing:.04em;
}
.btn:hover{background:var(--tsubox-blue-600)}
.btn:active{background:var(--tsubox-blue-700);transform:translateY(1px)}
.btn-ghost{
  background:#fff;color:var(--tsubox-blue);border:2px solid var(--tsubox-blue-200);
  box-shadow:var(--shadow-sm);font-size:15px;padding:12px 32px;
}
.btn-ghost:hover{background:var(--tsubox-blue-050)}
.btn-ghost:active{background:var(--tsubox-blue-100)}

/* ============ タイトル画面 ============ */
#screen-title{
  align-items:center;justify-content:center;gap:14px;
  overflow-y:auto;
  padding:24px 20px calc(18px + env(safe-area-inset-bottom));
  background:
    radial-gradient(circle at 12% 18%, var(--tsubox-blue-050) 0 56px, transparent 57px),
    radial-gradient(circle at 88% 30%, var(--tsubox-blue-050) 0 42px, transparent 43px),
    radial-gradient(circle at 18% 78%, var(--tsubox-blue-050) 0 48px, transparent 49px),
    radial-gradient(circle at 86% 84%, var(--tsubox-blue-050) 0 38px, transparent 39px),
    #fff;
}
#screen-title .logo{width:120px;display:block}
#title-h1{
  font-family:var(--font-round);font-weight:800;font-size:34px;
  color:var(--tsubox-blue-700);line-height:1.2;text-align:center;
}
#title-h1 small{display:block;font-size:14px;color:var(--ink-400);font-weight:700;margin-bottom:4px}
.title-chars{display:flex;gap:22px;align-items:flex-end;margin:6px 0 2px}
.title-chars .tc{display:flex;flex-direction:column;align-items:center;gap:2px}
.title-chars .tc span{font-size:12px;font-weight:700;color:var(--ink-600)}
.howto{
  background:var(--tsubox-blue-050);border:1px solid var(--tsubox-blue-100);
  border-radius:14px;padding:14px 18px;width:100%;max-width:330px;
}
.howto h2{font-size:13px;color:var(--tsubox-blue-700);margin-bottom:8px;letter-spacing:.08em}
.howto ol{list-style:none;display:flex;flex-direction:column;gap:7px}
.howto li{font-size:13.5px;line-height:1.55;color:var(--ink-600);display:flex;gap:8px}
.howto li b{color:var(--tsubox-blue-700)}
.howto .num{
  flex:none;width:20px;height:20px;border-radius:50%;background:var(--tsubox-blue);
  color:#fff;font-family:var(--font-display);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin-top:2px;
}
#best-line{font-size:13px;color:var(--ink-400);font-weight:500}
#best-line b{color:var(--tsubox-blue-700);font-family:var(--font-display);font-size:16px}
.site-footer{font-size:11px;color:var(--ink-400);text-align:center;line-height:1.7}
.site-footer a{color:var(--tsubox-blue);text-decoration:none}

/* ============ ゲーム画面 ============ */
#screen-game{background:linear-gradient(180deg,#fff 0%,var(--tsubox-blue-050) 100%)}
#hud{
  padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
  display:flex;align-items:center;gap:12px;background:#fff;
  border-bottom:1px solid var(--ink-100);
}
#hud .time-box{display:flex;align-items:baseline;gap:4px;min-width:74px}
#hud .time-num{font-family:var(--font-display);font-weight:800;font-size:30px;color:var(--ink-800);font-variant-numeric:tabular-nums}
#hud .time-num.warn{color:var(--tsubox-red)}
#hud .time-unit{font-size:11px;color:var(--ink-400);font-weight:700}
#hud .score-box{flex:1;text-align:right}
#hud .score-label{font-family:var(--font-display);font-size:10px;letter-spacing:.16em;color:var(--ink-400);font-weight:700}
#hud .score-num{font-family:var(--font-display);font-weight:800;font-size:24px;color:var(--tsubox-blue-700);font-variant-numeric:tabular-nums}
#mute-btn{
  border:1px solid var(--ink-100);background:#fff;border-radius:50%;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--ink-400);flex:none;
}
#timebar-wrap{height:6px;background:var(--ink-100)}
#timebar{height:100%;width:100%;background:var(--tsubox-blue);transition:width .1s linear}
#timebar.warn{background:var(--tsubox-red)}
#combo-pill{
  position:absolute;top:86px;left:50%;transform:translateX(-50%);
  background:var(--tsubox-blue);color:#fff;font-family:var(--font-round);
  font-weight:800;font-size:14px;padding:4px 16px;border-radius:999px;
  box-shadow:var(--shadow-sm);opacity:0;transition:opacity .2s;z-index:5;
}
#combo-pill.show{opacity:1}
#combo-pill.pulse{animation:pillPulse .25s ease-out}
@keyframes pillPulse{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.18)}100%{transform:translateX(-50%) scale(1)}}

#stage{flex:1;position:relative;overflow:hidden}
#stage.shake{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}

.visitor{
  position:absolute;left:50%;bottom:10px;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:transform .22s cubic-bezier(.22,.61,.36,1), opacity .22s;
}
.visitor .ghost-wrap{position:relative;animation:floaty 2.6s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.visitor .badge{
  position:absolute;top:-6px;right:-18px;width:52px;height:52px;border-radius:50%;
  background:#fff;border:2.5px solid var(--tsubox-blue);box-shadow:var(--shadow-sm);
  display:flex;align-items:center;justify-content:center;
}
.visitor .vlabel{
  font-family:var(--font-round);font-weight:800;font-size:15px;color:var(--tsubox-blue-700);
  background:#fff;border:1.5px solid var(--tsubox-blue-200);border-radius:999px;
  padding:3px 16px;box-shadow:var(--shadow-sm);white-space:nowrap;
}
.visitor.q1{transform:translateX(-50%) translate(86px,-128px) scale(.5);opacity:.55;z-index:1}
.visitor.q2{transform:translateX(-50%) translate(-92px,-150px) scale(.38);opacity:.3;z-index:0}
.visitor.cur{z-index:2;animation:popIn .22s cubic-bezier(.22,.61,.36,1)}
@keyframes popIn{from{transform:translateX(-50%) scale(.55) translateY(-40px);opacity:.4}to{transform:translateX(-50%) scale(1) translateY(0);opacity:1}}
.visitor.q1 .vlabel,.visitor.q2 .vlabel{display:none}
.visitor.q1 .badge,.visitor.q2 .badge{display:none}

.fly-clone{position:absolute;z-index:6;pointer-events:none}
.float-pts{
  position:absolute;z-index:7;pointer-events:none;
  font-family:var(--font-display);font-weight:800;font-size:24px;color:var(--tsubox-blue);
  animation:rise .7s ease-out forwards;text-shadow:0 1px 0 #fff;
}
.float-pts.penalty{color:var(--tsubox-red);font-size:18px}
@keyframes rise{from{transform:translateY(0);opacity:1}to{transform:translateY(-56px);opacity:0}}
.speech{
  position:absolute;z-index:7;pointer-events:none;
  font-family:var(--font-round);font-weight:800;font-size:14px;color:var(--tsubox-blue-700);
  background:#fff;border:1.5px solid var(--tsubox-blue-200);border-radius:999px;padding:4px 14px;
  box-shadow:var(--shadow-sm);animation:speechPop .65s ease-out forwards;white-space:nowrap;
}
@keyframes speechPop{0%{transform:scale(.5);opacity:0}25%{transform:scale(1.05);opacity:1}80%{opacity:1}100%{transform:scale(1) translateY(-10px);opacity:0}}
#wrong-mark{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:8;pointer-events:none;
}
#wrong-mark.show{display:flex;animation:xFade .45s ease-out forwards}
@keyframes xFade{0%{opacity:0;transform:scale(.6)}30%{opacity:1;transform:scale(1.05)}100%{opacity:0;transform:scale(1)}}

#partition{display:block;width:100%;margin-bottom:-4px;position:relative;z-index:3}
#lanes{
  display:flex;gap:8px;padding:0 10px calc(12px + env(safe-area-inset-bottom));
  background:transparent;position:relative;z-index:4;
}
.lane{
  flex:1;background:#fff;border:2px solid var(--tsubox-blue-200);border-radius:14px;
  padding:10px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;box-shadow:var(--shadow-sm);
  transition:background .12s,border-color .12s,transform .1s;
  font-family:var(--font-jp);
}
.lane:active{background:var(--tsubox-blue-050);transform:translateY(1px)}
.lane .lane-label{font-weight:900;font-size:15px;color:var(--ink-800);letter-spacing:.02em}
.lane .lane-sub{font-size:10px;color:var(--ink-400);font-weight:500}
.lane.hit{border-color:var(--tsubox-blue);background:var(--tsubox-blue-050)}
.lane.bad{border-color:var(--tsubox-red);animation:badFlash .35s}
@keyframes badFlash{0%,100%{background:#fff}40%{background:#FDF0F2}}

/* ============ リザルト画面 ============ */
#screen-result{
  align-items:center;justify-content:center;gap:12px;
  overflow-y:auto;
  padding:24px 22px calc(18px + env(safe-area-inset-bottom));text-align:center;
}
#result-rank{
  font-family:var(--font-round);font-weight:800;font-size:32px;color:var(--tsubox-blue-700);line-height:1.25;
}
#result-score{
  font-family:var(--font-display);font-weight:800;font-size:58px;color:var(--ink-800);
  line-height:1;font-variant-numeric:tabular-nums;
}
#result-score small{font-size:16px;color:var(--ink-400);font-weight:700;margin-left:4px}
#result-newbest{
  font-family:var(--font-round);font-weight:800;color:var(--tsubox-red);font-size:15px;
  visibility:hidden;animation:pillPulse .4s ease-out .2s 2;
}
.result-stats{
  display:flex;gap:10px;width:100%;max-width:330px;
}
.result-stats .stat{
  flex:1;background:var(--tsubox-blue-050);border:1px solid var(--tsubox-blue-100);
  border-radius:12px;padding:10px 4px;
}
.result-stats .stat .v{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--tsubox-blue-700)}
.result-stats .stat .k{font-size:11px;color:var(--ink-400);font-weight:700;margin-top:2px}
#result-msg{font-size:13.5px;line-height:1.8;color:var(--ink-600);max-width:320px}
.result-btns{display:flex;flex-direction:column;gap:10px;margin-top:6px;align-items:center}
#result-chars{display:flex;gap:14px;align-items:flex-end}
</style>
</head>

  {min:12000, name:'伝説のイベンター', msg:'完璧なオペレーションです。あなたの受付さばきは全国のイベント現場で語り継がれるでしょう。ツーボックスが全力でスカウトしたい逸材です。'},
  {min:9000,  name:'現場監督',         msg:'お見事です。どんな大型イベントでも安心して任せられる、頼れる現場のまとめ役です。伝説まであと一歩。'},
  {min:6000,  name:'受付リーダー',     msg:'素晴らしいさばきでした。後輩スタッフから頼られる存在です。コンボを切らさなければ、さらに上を狙えます。'},
  {min:3000,  name:'受付スタッフ',     msg:'順調な滑り出しです。アイコンを先読みして、テンポよく誘導できるようになるとスコアが伸びます。'},
  {min:0,     name:'研修中スタッフ',   msg:'受付はスピードと正確さが命です。列に並んでいる次の来場者にも注目すると、もっとさばけるようになります。'}
];

const SPEECHES = ['ようこそ！','ありがとう！','ナイス誘導！','スムーズ！','たすかる〜！','はやい！'];

/* ====================== サウンド ====================== */
let actx = null;
let muted = localStorage.getItem('tsubox_uketsuke_mute') === '1';
function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ actx = null; }
  }
  if(actx && actx.state === 'suspended') actx.resume();
}
function beep(freq, dur=0.08, type='sine', gain=0.06, delay=0){
  if(muted || !actx) return;
  const t = actx.currentTime + delay;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
const sfx = {
  correct(combo){
    beep(660,.07,'sine',.06); beep(880,.09,'sine',.06,.06);
    if(combo > 0 && combo % 10 === 0) beep(1320,.12,'sine',.07,.13);
  },
  wrong(){ beep(150,.2,'square',.05); },
  tick(){ beep(880,.05,'sine',.04); },
  start(){ beep(523,.09,'sine',.06); beep(659,.09,'sine',.06,.1); beep(784,.14,'sine',.07,.2); },
  end(){ beep(784,.1,'sine',.06); beep(659,.1,'sine',.06,.11); beep(523,.2,'sine',.07,.22); }
};
function renderMuteBtn(){
  $('#mute-btn').innerHTML = muted
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>`;
}

/* ====================== ゲーム状態 ====================== */
const GAME_MS = 60000;
const PENALTY_MS = 3000;
let state = null;
let timerId = null;
let lastTickSec = null;

function newVisitor(){
  return { type: Math.floor(Math.random()*3), char: Math.random() < .5 ? 'b' : 'p' };
}

function show(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('#screen-' + name).classList.add('active');
}

/* ====================== 描画 ====================== */
function buildLanes(){
  $('#lanes').innerHTML = TYPES.map((t,i) => `
    <button class="lane" data-lane="${i}" aria-label="${t.label}レーン">
      ${ICONS[t.key](40)}
      <span class="lane-label">${t.label}</span>
      <span class="lane-sub">${t.sub}</span>
    </button>`).join('');
  document.querySelectorAll('.lane').forEach(b => {
    b.addEventListener('pointerdown', e => { e.preventDefault(); answer(+b.dataset.lane); });
  });
}

function visitorHTML(v, cls){
  const t = TYPES[v.type];
  return `
  <div class="visitor ${cls}">
    <div class="ghost-wrap">
      ${ghostSVG(v.char, 130)}
      <div class="badge">${ICONS[t.key](32)}</div>
    </div>
    <div class="vlabel">${t.label}</div>
  </div>`;
}

function renderQueue(){
  const old = document.querySelectorAll('#stage .visitor');
  old.forEach(el => el.remove());
  const q = state.queue;
  $('#stage').insertAdjacentHTML('beforeend',
    visitorHTML(q[2],'q2') + visitorHTML(q[1],'q1') + visitorHTML(q[0],'cur'));
}

function updateHUD(){
  $('#score-num').textContent = state.score.toLocaleString();
  const pill = $('#combo-pill');
  $('#combo-num').textContent = state.combo;
  pill.classList.toggle('show', state.combo >= 2);
  if(state.combo >= 2){
    pill.classList.remove('pulse'); void pill.offsetWidth; pill.classList.add('pulse');
  }
}

/* ====================== 進行 ====================== */
function startGame(){
  ensureAudio();
  state = {
    score:0, combo:0, maxCombo:0, handled:0, miss:0,
    end: Date.now() + GAME_MS, over:false,
    queue:[newVisitor(), newVisitor(), newVisitor()]
  };
  lastTickSec = null;
  buildLanes();
  renderQueue();
  updateHUD();
  $('#time-num').classList.remove('warn');
  $('#timebar').classList.remove('warn');
  show('game');
  sfx.start();
  clearInterval(timerId);
  timerId = setInterval(tick, 100);
}

function tick(){
  const remain = Math.max(0, state.end - Date.now());
  const sec = Math.ceil(remain/1000);
  $('#time-num').textContent = sec;
  $('#timebar').style.width = (remain/GAME_MS*100) + '%';
  const warn = remain <= 10000;
  $('#time-num').classList.toggle('warn', warn);
  $('#timebar').classList.toggle('warn', warn);
  if(sec <= 3 && sec >= 1 && sec !== lastTickSec){ sfx.tick(); lastTickSec = sec; }
  if(remain <= 0) endGame();
}

function answer(lane){
  if(!state || state.over) return;
  const v = state.queue[0];
  const laneEl = document.querySelector(`.lane[data-lane="${lane}"]`);
  if(lane === v.type){
    state.combo++;
    state.maxCombo = Math.max(state.maxCombo, state.combo);
    const pts = 100 + Math.min(state.combo - 1, 20) * 10;
    state.score += pts;
    state.handled++;
    sfx.correct(state.combo);
    laneEl.classList.remove('hit'); void laneEl.offsetWidth; laneEl.classList.add('hit');
    setTimeout(() => laneEl.classList.remove('hit'), 200);
    flyToLane(v, lane);
    popPts('+' + pts);
    if(Math.random() < .4) popSpeech();
    state.queue.shift();
    state.queue.push(newVisitor());
    renderQueue();
    updateHUD();
  } else {
    state.miss++;
    state.combo = 0;
    state.end -= PENALTY_MS;
    sfx.wrong();
    laneEl.classList.remove('bad'); void laneEl.offsetWidth; laneEl.classList.add('bad');
    setTimeout(() => laneEl.classList.remove('bad'), 380);
    const stage = $('#stage');
    stage.classList.remove('shake'); void stage.offsetWidth; stage.classList.add('shake');
    const wm = $('#wrong-mark');
    wm.classList.remove('show'); void wm.offsetWidth; wm.classList.add('show');
    popPts('−3秒', true);
    updateHUD();
    tick();
  }
}

function flyToLane(v, lane){
  const stage = $('#stage');
  const cur = stage.querySelector('.visitor.cur');
  const laneEl = document.querySelector(`.lane[data-lane="${lane}"]`);
  if(!cur || !laneEl) return;
  const sr = stage.getBoundingClientRect();
  const cr = cur.getBoundingClientRect();
  const lr = laneEl.getBoundingClientRect();
  const clone = document.createElement('div');
  clone.className = 'fly-clone';
  clone.style.left = (cr.left - sr.left) + 'px';
  clone.style.top = (cr.top - sr.top) + 'px';
  clone.style.width = cr.width + 'px';
  clone.innerHTML = cur.innerHTML;
  stage.appendChild(clone);
  const dx = (lr.left + lr.width/2) - (cr.left + cr.width/2);
  const dy = (lr.top + lr.height/2) - (cr.top + cr.height/2);
  clone.animate(
    [
      {transform:'translate(0,0) scale(1)', opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(.22)`, opacity:0}
    ],
    {duration:340, easing:'cubic-bezier(.55,.06,.68,.19)'}
  ).onfinish = () => clone.remove();
}

function popPts(text, penalty){
  const stage = $('#stage');
  const el = document.createElement('div');
  el.className = 'float-pts' + (penalty ? ' penalty' : '');
  el.textContent = text;
  el.style.left = (stage.clientWidth/2 - 30 + (Math.random()*40 - 20)) + 'px';
  el.style.top = (stage.clientHeight * .28) + 'px';
  stage.appendChild(el);
  setTimeout(() => el.remove(), 720);
}

function popSpeech(){
  const stage = $('#stage');
  const el = document.createElement('div');
  el.className = 'speech';
  el.textContent = SPEECHES[Math.floor(Math.random()*SPEECHES.length)];
  el.style.left = (stage.clientWidth/2 + 40) + 'px';
  el.style.top = (stage.clientHeight * .42) + 'px';
  stage.appendChild(el);
  setTimeout(() => el.remove(), 680);
}

function endGame(){
  state.over = true;
  clearInterval(timerId);
  sfx.end();
  const rank = RANKS.find(r => state.score >= r.min);
  $('#result-rank').textContent = rank.name;
  $('#result-score').innerHTML = state.score.toLocaleString() + '<small>点</small>';
  $('#stat-handled').textContent = state.handled + '人';
  $('#stat-combo').textContent = '×' + state.maxCombo;
  $('#stat-miss').textContent = state.miss + '回';
  let msg = rank.msg;
  if(state.miss === 0 && state.handled > 0) msg += '（ノーミス達成、お見事です）';
  $('#result-msg').textContent = msg;
  $('#result-chars').innerHTML = ghostSVG('b', 84) + ghostSVG('p', 84);
  const best = +(localStorage.getItem('tsubox_uketsuke_best') || 0);
  const isNew = state.score > best;
  if(isNew) localStorage.setItem('tsubox_uketsuke_best', state.score);
  $('#result-newbest').style.visibility = isNew && state.score > 0 ? 'visible' : 'hidden';
  setTimeout(() => show('result'), 450);
}

function renderTitle(){
  $('#char-b-slot').innerHTML = ghostSVG('b', 96);
  $('#char-p-slot').innerHTML = ghostSVG('p', 96);
  const best = +(localStorage.getItem('tsubox_uketsuke_best') || 0);
  $('#best-line').innerHTML = best > 0
    ? `ベストスコア <b>${best.toLocaleString()}</b> 点`
    : 'はじめての方も30秒でルールがわかります';
}

/* ====================== 入力 ====================== */
$('#start-btn').addEventListener('click', startGame);
$('#retry-btn').addEventListener('click', startGame);
$('#title-btn').addEventListener('click', () => { renderTitle(); show('title'); });
$('#mute-btn').addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('tsubox_uketsuke_mute', muted ? '1' : '0');
  renderMuteBtn();
  if(!muted){ ensureAudio(); beep(660,.07); }
});

document.addEventListener('keydown', e => {
  if(!$('#screen-game').classList.contains('active')) return;
  const map = {ArrowLeft:0, ArrowDown:1, ArrowRight:2};
  if(e.key in map){ e.preventDefault(); answer(map[e.key]); }
});

let touchStart = null;
$('#stage').addEventListener('touchstart', e => {
  touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
}, {passive:true});
$('#stage').addEventListener('touchend', e => {
  if(!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if(Math.abs(dx) < 36 && Math.abs(dy) < 36) return;
  if(Math.abs(dx) > Math.abs(dy)) answer(dx < 0 ? 0 : 2);
  else if(dy > 0) answer(1);
}, {passive:true});

/* ====================== 初期化 ====================== */
const eyeStyle = document.createElement('style');
eyeStyle.textContent = `
.g-eye{transform-box:fill-box;transform-origin:center;animation:blink 4.2s infinite}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}95.5%,97%{transform:scaleY(.08)}}`;
document.head.appendChild(eyeStyle);

renderMuteBtn();
renderTitle();
</script>
</body>
</html>
